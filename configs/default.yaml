# default.yaml — all training hyperparameters in one place
# Every value here maps directly to CFG in the notebook

# ── Data ────────────────────────────────────────────────────────────────────
data_root      : "./NEU-CLS"
img_size       : 224
num_classes    : 6
class_names    :
  - Crazing
  - Inclusion
  - Patches
  - Pitted
  - Rolled-in Scale
  - Scratches

# ── Model ────────────────────────────────────────────────────────────────────
backbone       : "efficientnet_b4"
pretrained     : true
drop_rate      : 0.3

# ── Training ─────────────────────────────────────────────────────────────────
epochs         : 30
batch_size     : 32
lr             : 0.0003       # peak LR (backbone gets lr * 0.1)
weight_decay   : 0.0001
warmup_epochs  : 3
label_smoothing: 0.1
grad_clip      : 1.0
amp            : true         # automatic mixed precision

# ── Cross-validation ─────────────────────────────────────────────────────────
n_folds        : 5
fold_to_train  : 0            # 0-indexed; train all 5 for full eval

# ── Dataset statistics (computed from NEU-CLS training set) ──────────────────
mean           : [0.5023, 0.5023, 0.5023]
std            : [0.2159, 0.2159, 0.2159]
